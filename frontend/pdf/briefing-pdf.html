<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UpstreamWX — Expedition Weather Briefing</title>
<!--
  PDF export template (FR-27, PRD §17.3).

  A print-optimized, single-origin render of the structured briefing contract
  (the same object the PWA renders its views from — frontend/data/sample-briefing.json,
  api BriefingResponse). Deliberately a LIGHT "paper" document rather than the dark
  PWA chrome: a PDF is read on paper or a white reader pane, where the dark briefing
  surface wastes ink and loses contrast. The FR-35 severity ladder is preserved as the
  ONLY loud color, per the style guide's "severity is the only loud color" principle.

  Reference-only (the five non-negotiables): this renders the engine's structured
  result verbatim and never emits a verdict. The §17.3 reference-only footer rides on
  every printed page.

  Data source: window.__BRIEFING__ if injected (the live tool path), else it fetches
  ../data/sample-briefing.json so the file is openable standalone as a worked example.
-->
<style>
  /* ── Page geometry ─────────────────────────────────────────────────────
     US Letter with a running footer reserved on every page. */
  @page {
    size: Letter;
    /* Zero TOP/BOTTOM margins so the browser's own print chrome (URL, date,
       "Page x of y") has no margin box to render into and is suppressed. The
       page's real top margin and the reference-only footer are supplied
       in-document by the layout table's <thead> spacer and repeating <tfoot>
       (see Pagination below), which print on every page in every engine —
       including iOS Safari, where position:fixed footers do NOT repeat.
       Side margins (≈0.71") stay here for horizontal breathing room. */
    margin: 0 18mm;
  }

  :root {
    /* Paper surfaces (light theme — print-first) */
    --p-bg: #ffffff;
    --p-surface: #f6f8fa;
    --p-surface-2: #eef2f6;
    --p-border: #d3dae3;
    --p-border-strong: #b6c0cc;
    --p-ink: #14181f;
    --p-ink-2: #41505f;
    --p-ink-muted: #6b7888;
    --p-brand: #0b76b8;        /* river cyan, darkened for paper contrast */
    --p-brand-ink: #075681;

    /* FR-35 severity ladder — the only semantic color set */
    --sev-minimal: #2f9e41;
    --sev-elevated: #c08a00;
    --sev-high: #e06a1f;
    --sev-extreme: #d83631;
    --heat-caution: #b89000;
    --heat-ext-caution: #c47a16;
    --heat-danger: #c4521f;
    --heat-ext-danger: #c02824;

    --sev-minimal-wash: #e7f5ea;
    --sev-elevated-wash: #fbf3dd;
    --sev-high-wash: #fdeede;
    --sev-extreme-wash: #fce4e3;
    --heat-caution-wash: #f8f1d6;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #5a6675;           /* screen-only gutter around the page */
    color: var(--p-ink);
    font-family: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    font-size: 10.5pt;
    line-height: 1.45;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    /* Disable mobile/WebKit text auto-inflation (iOS Safari enlarges body text
       on print, which blew the fonts up and broke pagination — 2 pages became
       3). Pin it so the pt sizes render as authored on every device. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  .mono { font-family: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace; }

  /* The page sheet — visible on screen, dissolves into the print page. */
  .sheet {
    width: 198mm;
    min-height: 272mm;
    margin: 10mm auto;
    padding: 13mm 14mm 16mm;
    background: var(--p-bg);
    box-shadow: 0 2px 14px rgba(0,0,0,0.35);
  }

  /* ── Masthead ─────────────────────────────────────────────────────────── */
  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--p-brand);
  }
  .brand__logo { height: 42px; width: auto; display: block; flex: none; }
  .masthead__doc {
    text-align: right;
    font-size: 7.5pt; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--p-ink-muted); font-weight: 600;
  }
  .masthead__doc strong { display: block; font-size: 11pt; letter-spacing: 0.02em; color: var(--p-ink); margin-top: 2px; }

  /* ── Mission meta strip ───────────────────────────────────────────────── */
  .mission {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; margin-top: 9px;
  }
  .mission__title { font-size: 18pt; font-weight: 700; line-height: 1.1; margin: 0; }
  .mission__sub { font-size: 9pt; color: var(--p-ink-2); margin-top: 3px; }
  .meta-grid {
    display: grid; grid-template-columns: auto auto; gap: 2px 18px;
    font-size: 8.5pt; text-align: right; color: var(--p-ink-2);
  }
  .meta-grid dt { color: var(--p-ink-muted); }
  .meta-grid dd { margin: 0; font-weight: 600; color: var(--p-ink); }
  .meta-row { display: contents; }

  /* ── Section scaffolding ──────────────────────────────────────────────── */
  .section { margin-top: 9px; }
  .section--break { break-inside: avoid; }
  .section__head {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 8pt; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--p-brand-ink);
    border-bottom: 1px solid var(--p-border);
    padding-bottom: 4px; margin-bottom: 9px;
  }
  .section__head .hint { margin-left: auto; font-weight: 600; letter-spacing: 0.04em; color: var(--p-ink-muted); }

  /* ── BLUF banner ──────────────────────────────────────────────────────── */
  .bluf {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--p-border);
    background: var(--p-surface);
  }
  .bluf__posture { display: flex; flex-direction: column; gap: 3px; }
  .bluf__eyebrow { font-size: 7.5pt; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--p-ink-muted); }
  .bluf__chip {
    align-self: flex-start;
    font-size: 15pt; font-weight: 800; line-height: 1;
    padding: 6px 14px; border-radius: 7px; color: #fff;
    text-align: center;
  }
  .bluf__conf { font-size: 8.5pt; color: var(--p-ink-2); }
  .bluf__conf strong { color: var(--p-ink); }
  .bluf__summary { font-size: 9.5pt; line-height: 1.5; margin: 0; color: var(--p-ink); }
  .bluf__divider { width: 1px; align-self: stretch; background: var(--p-border); }

  /* ── Hazard BLUF table ────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; }
  .hz-table th, .hz-table td {
    text-align: left; padding: 4px 8px; font-size: 9pt;
    border-bottom: 1px solid var(--p-border);
  }
  .hz-table th {
    font-size: 7.5pt; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--p-ink-muted); border-bottom: 1px solid var(--p-border-strong);
  }
  .hz-table td.hz-name { font-weight: 600; }
  .hz-table .col-c { text-align: center; }
  .hz-icon { width: 15px; height: 15px; vertical-align: -2px; margin-right: 6px; color: var(--p-ink-2); }

  /* Severity chip (inline, table + phases) */
  .chip {
    display: inline-block; font-size: 8pt; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; color: #fff; white-space: nowrap;
  }
  .chip--ghost { background: transparent !important; color: var(--p-ink-muted) !important; border: 1px solid var(--p-border-strong); font-weight: 600; }

  /* Confidence pip + label */
  .conf { display: inline-flex; align-items: center; gap: 5px; font-size: 8.5pt; color: var(--p-ink-2); }
  .conf__dots { display: inline-flex; gap: 2px; }
  .conf__dot { width: 6px; height: 6px; border-radius: 999px; border: 1px solid var(--p-brand-ink); }
  .conf__dot.on { background: var(--p-brand-ink); }

  /* ── Phase breakdown ──────────────────────────────────────────────────── */
  /* minmax(0, 1fr) (not bare 1fr) so columns can shrink below the min-content
     of unbreakable strings ('Lightning — Extreme', 'Cold/wet'); bare 1fr lets
     those push the grid past the right margin and clip the last card. */
  .phases { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; }
  .phase {
    border: 1px solid var(--p-border); border-radius: 8px; overflow: hidden;
    break-inside: avoid; background: var(--p-bg);
  }
  .phase__head {
    padding: 5px 10px; background: var(--p-surface);
    border-bottom: 1px solid var(--p-border);
  }
  .phase__name { font-size: 8pt; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--p-ink); }
  .phase__win { font-size: 8pt; color: var(--p-ink-muted); }
  .phase__lead { font-size: 8.5pt; font-weight: 600; color: var(--p-brand-ink); margin-top: 2px; }
  .phase__body { padding: 5px 10px 7px; font-size: 8.5pt; }
  .phase__applies { color: var(--p-ink-2); }
  .phase__note {
    margin-top: 6px; padding: 5px 7px; border-radius: 5px;
    background: var(--sev-elevated-wash); color: #7a5b00;
    font-size: 7.8pt; line-height: 1.35;
  }

  /* ── Hazard detail cards ──────────────────────────────────────────────── */
  .hz-detail { break-inside: avoid; padding: 9px 0; border-bottom: 1px solid var(--p-border); }
  .hz-detail:last-child { border-bottom: 0; }
  .hz-detail__head { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; }
  .hz-detail__name { font-size: 10.5pt; font-weight: 700; }
  .hz-detail__name .hz-icon { width: 17px; height: 17px; }
  .hz-detail ul { margin: 4px 0 0; padding-left: 16px; }
  .hz-detail li { font-size: 9pt; line-height: 1.4; margin-bottom: 1px; }
  .hz-detail__logic { font-size: 8pt; color: var(--p-ink-muted); margin-top: 5px; line-height: 1.4; }
  .hz-detail__assume {
    font-size: 8pt; color: #7a5b00; margin-top: 5px; line-height: 1.4;
    padding-left: 18px; position: relative;
  }
  .hz-detail__assume::before { content: "▲"; position: absolute; left: 4px; font-size: 7pt; top: 1px; }

  /* ── Forecast hourly table ────────────────────────────────────────────── */
  .fx-wrap { overflow: hidden; border: 1px solid var(--p-border); border-radius: 8px; }
  .fx-table { font-size: 8pt; }
  .fx-table th, .fx-table td {
    padding: 3px 4px; text-align: center; border-bottom: 1px solid var(--p-border);
    border-right: 1px solid var(--p-border);
  }
  .fx-table th:last-child, .fx-table td:last-child { border-right: 0; }
  .fx-table tr:last-child td { border-bottom: 0; }
  .fx-table thead th { background: var(--p-surface-2); font-weight: 700; font-size: 7.5pt; }
  .fx-table tbody th {
    text-align: left; font-weight: 600; color: var(--p-ink-2);
    background: var(--p-surface); white-space: nowrap; font-size: 7.8pt;
  }
  .fx-table td.mono { font-variant-numeric: tabular-nums; }

  /* ── Source data + resources ──────────────────────────────────────────── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .kv { font-size: 8.5pt; }
  .kv__row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 2.5px 0; border-bottom: 1px dotted var(--p-border); }
  .kv__row:last-child { border-bottom: 0; }
  .kv__k { color: var(--p-ink-2); flex: 1 1 auto; min-width: 0; }
  .kv__v { font-weight: 600; font-variant-numeric: tabular-nums; flex: none; white-space: nowrap; text-align: right; }
  .src { font-size: 8.5pt; padding: 5px 0; border-bottom: 1px solid var(--p-border); break-inside: avoid; }
  .src:last-child { border-bottom: 0; }
  .src__title { font-weight: 600; }
  .src__url { color: var(--p-brand-ink); word-break: break-all; font-size: 7.8pt; }
  .src__sub { color: var(--p-ink-muted); font-size: 7.8pt; }

  /* ── Framing attribution banner ───────────────────────────────────────── */
  .framed-banner {
    margin-top: 10px; padding: 6px 10px; border-radius: 6px;
    background: var(--p-surface-2); border: 1px solid var(--p-border);
    font-size: 7.8pt; color: var(--p-ink-2);
  }

  /* ── Pagination ───────────────────────────────────────────────────────── */
  .page-break-before { break-before: page; page-break-before: always; }
  .section__head { break-after: avoid; page-break-after: avoid; } /* never orphan a heading */

  /* ── Running margins + reference-only footer (§17.3, FR-29/FR-40) ──────────
     All content is wrapped in <table class="layout">. Browsers repeat a table's
     <thead> and <tfoot> on EVERY printed page.
       · <thead> holds .run-top = the top page margin, every page.
       · <tfoot> holds .run-foot = bottom-margin spacer, every page. It is a
         bare spacer only (no footer text) so position:fixed on .page-foot can
         own the footer without needing to live inside a hidden tfoot.
       · .page-foot sits outside the table as a fixed sibling; Chromium repeats
         position:fixed elements on every PDF page. */
  .layout { width: 100%; border-collapse: collapse; }
  .layout > thead > tr > td, .layout > tbody > tr > td, .layout > tfoot > tr > td { padding: 0; }
  .run-top { height: 10mm; }    /* top page margin, every page */
  .run-foot { height: 22mm; }   /* bottom margin + footer clearance, every page */

  .page-foot {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 14px;
    margin-top: 5mm; border-top: 1.5px solid var(--p-brand); padding-top: 4px;
    font-size: 7pt; line-height: 1.35; color: var(--p-ink-2);
  }
  .page-foot__note { max-width: 158mm; }
  .page-foot__note strong { color: var(--p-ink); }
  .page-foot__meta { flex: none; text-align: right; white-space: nowrap; color: var(--p-ink-muted); }

  /* ── Print overrides ──────────────────────────────────────────────────── */
  @media print {
    html, body { background: #fff; }
    .sheet { width: auto; min-height: 0; margin: 0; padding: 0; box-shadow: none; }
    .no-print { display: none !important; }
    /* Pin the footer to the bottom of every page. .page-foot lives outside the
       layout table so hiding tfoot never affects it. Chromium repeats fixed
       elements on every PDF page. */
    .page-foot {
      position: fixed;
      bottom: 9mm;
      left: 0;
      right: 0;
      margin-top: 0;
      background: var(--p-bg);
    }
  }
  @media screen {
    .run-top { height: 0; }    /* the screen .sheet already pads the top */
    .run-foot { height: 0; }   /* screen doesn't need the per-page bottom spacer */
  }

  /* Screen-only toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: #11161f; color: #e6edf3;
    font-size: 9pt;
  }
  .toolbar button {
    font: inherit; font-weight: 600; cursor: pointer;
    background: #0b76b8; color: #fff; border: 0; border-radius: 6px; padding: 6px 14px;
  }
  .toolbar button.secondary { background: transparent; border: 1px solid #9aa7b8; color: #e6edf3; }
  .toolbar span { color: #9aa7b8; }
</style>
</head>
<body>
<div class="toolbar no-print">
  <button id="tb-print">Save as PDF</button>
  <button id="tb-back" class="secondary">Back</button>
  <span>Use the browser's share or print menu to save this briefing as a PDF.</span>
</div>

<div class="sheet" id="sheet">
  <p class="no-print" style="text-align:center;color:#6b7888;margin-top:40px">Loading briefing…</p>
</div>

<script src="briefing-pdf.js"></script>
</body>
</html>
