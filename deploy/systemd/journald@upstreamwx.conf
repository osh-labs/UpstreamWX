# UpstreamWX — dedicated journald log namespace retention (roadmap §M0.1.1).
#
# The API runs with `LogNamespace=upstreamwx` (deploy/systemd/upstreamwx-api.service),
# so all of its stdout/stderr lands in a PRIVATE journald instance —
# systemd-journald@upstreamwx — that this file configures. That lets us prune the
# service's logs to ~10 days WITHOUT imposing that retention on the rest of the host's
# system journal (kernel, sshd, nginx, cron …), which keeps its own defaults.
#
# bootstrap.sh installs this to /etc/systemd/journald@upstreamwx.conf.
#
# Read these logs with:
#   journalctl --namespace=upstreamwx -u upstreamwx-api -f
#
# After editing, apply by restarting the namespaced journald:
#   sudo systemctl restart systemd-journald@upstreamwx

[Journal]
# Persist across reboots so the 10-day window is real wall-clock time, not "since boot".
Storage=persistent
# The retention guarantee: drop anything older than 10 days.
MaxRetentionSec=10day
# Rotate journal files daily so age-based pruning acts promptly — MaxRetentionSec only
# deletes a file once it is *entirely* older than the limit, so without rotation a single
# long-lived file would keep entries well past 10 days.
MaxFileSec=1day
# Size safety net: bound disk use so a log storm can't fill the volume before the age
# limit bites. Generous for this service's volume; tune in the conf if logs grow.
SystemMaxUse=500M
RuntimeMaxUse=100M
