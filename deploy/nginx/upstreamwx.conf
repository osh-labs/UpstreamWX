# UpstreamWX — nginx reverse proxy in front of the uvicorn backend (the APP site).
#
# Template: bootstrap.sh renders the __TOKENS__ from deploy/config.env and resolves the TLS
# conditional regions (render_nginx_site in deploy/_lib.sh), installing the result to
# /etc/nginx/sites-available/<service>.conf (symlinked into sites-enabled).
#
# SA-09: the :443 TLS block and the HTTP->HTTPS redirect are UNDER VERSION CONTROL here, not
# rewritten out-of-band by `certbot --nginx`. certbot runs in --webroot mode purely to
# issue/renew the cert into /etc/letsencrypt/live/…; the ACME http-01 challenge location on
# :80 stays reachable for renewals. render_nginx_site keeps exactly one serving path:
#   DEPLOY_TLS_ENABLE=0  → the :80 server serves the app (pre-cert / tailnet, no TLS yet)
#   DEPLOY_TLS_ENABLE=1  → the :80 server only redirects (+ ACME); the :443 block serves.
# One multi-SAN cert covers this app name and the apex landing names (deploy/nginx/landing.conf).
#
# The API and the PWA are single-origin (M0.4): uvicorn serves /v1/* AND the static PWA, so
# nginx just proxies everything through to one upstream.

upstream upstreamwx_api {
    server __BIND_HOST__:__BIND_PORT__;
    keepalive 16;
}

# Rate-limit the EXPENSIVE endpoints only. /v1/briefing and /v1/watershed/warm each do
# seconds of CPU (GRIB decode, watershed delineation) on a single uvicorn process, so a
# flood can effectively DoS the box. Keyed by client IP. http context.
limit_req_zone $binary_remote_addr zone=uwx_briefing:10m rate=2r/s;
# Session minting (SA-01) is cheap but freely-mintable anonymous tokens are the model's weak
# point, so cap it hard at the edge too — beneath the app's own per-IP mint limiter.
limit_req_zone $binary_remote_addr zone=uwx_session:10m rate=1r/s;

server {
    listen 80;
    listen [::]:80;
    server_name __APP_SERVER_NAME__;

    # ACME http-01 challenge — always served on :80 so certbot --webroot can issue/renew
    # the cert even once everything else redirects to HTTPS (SA-09).
    location ^~ /.well-known/acme-challenge/ {
        root __ACME_WEBROOT__;
        default_type "text/plain";
        try_files $uri =404;
    }

    # __REDIRECT_BEGIN__
    # TLS on: send everything else to HTTPS. The Secure SA-01 cookie needs live TLS.
    location / {
        return 301 https://$host$request_uri;
    }
    # __REDIRECT_END__

    # __HTTP_ONLY_BEGIN__
    # TLS off (bootstrap / tailnet staging): serve the app directly on :80.
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    client_max_body_size 4m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://server.arcgisonline.com https://s3.amazonaws.com https://tiles.openfreemap.org; font-src 'self'; connect-src 'self' https://tiles.openfreemap.org https://server.arcgisonline.com https://s3.amazonaws.com https://nominatim.openstreetmap.org; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://upstreamwx_api;
    }
    location /v1/briefing {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location /v1/watershed/warm {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location = /v1/session {
        limit_req zone=uwx_session burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location = /v1/health {
        proxy_pass http://upstreamwx_api;
        access_log off;
    }
    # __HTTP_ONLY_END__
}

# __TLS_BEGIN__
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name __APP_SERVER_NAME__;

    # SA-09: cert issued by certbot --webroot; paths are the standard live layout. Renewal is
    # certbot's systemd timer (bootstrap adds a reload deploy-hook). Modern TLS defaults from
    # certbot's options-ssl-nginx.conf; include it if present (best-effort).
    ssl_certificate __TLS_CERT__;
    ssl_certificate_key __TLS_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:UWXSSL:10m;
    ssl_session_tickets off;

    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    client_max_body_size 4m;

    # HSTS is only safe (and only honoured) over live HTTPS, so it lives in the :443 block.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://server.arcgisonline.com https://s3.amazonaws.com https://tiles.openfreemap.org; font-src 'self'; connect-src 'self' https://tiles.openfreemap.org https://server.arcgisonline.com https://s3.amazonaws.com https://nominatim.openstreetmap.org; worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://upstreamwx_api;
    }
    location /v1/briefing {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location /v1/watershed/warm {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location = /v1/session {
        limit_req zone=uwx_session burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location = /v1/health {
        proxy_pass http://upstreamwx_api;
        access_log off;
    }
}
# __TLS_END__
