# UpstreamWX — nginx reverse proxy in front of the uvicorn backend (the APP site).
#
# Template: bootstrap.sh renders the __TOKENS__ from deploy/config.env and installs the
# result to /etc/nginx/sites-available/<service>.conf (symlinked into sites-enabled).
#
# This is the app's own subdomain (app.upstreamwx.com). The apex (upstreamwx.com) serves
# a separate static landing page — see deploy/nginx/landing.conf. Both names go in ONE
# multi-SAN cert. This config is HTTP-only on :80; run certbot AFTER install to add TLS —
# it rewrites these server blocks in place and adds the :443 listener and HTTP->HTTPS
# redirect:
#
#     sudo certbot --nginx -d __APP_SERVER_NAME__ -d upstreamwx.com -d www.upstreamwx.com
#
# The API and the PWA are single-origin (M0.4): uvicorn serves /v1/* AND the static PWA,
# so nginx just proxies everything through to one upstream.

upstream upstreamwx_api {
    server __BIND_HOST__:__BIND_PORT__;
    keepalive 16;
}

# Rate-limit the EXPENSIVE endpoints only. /v1/briefing and /v1/watershed/warm each do
# seconds of CPU (GRIB decode, watershed delineation) on a single uvicorn process, so a
# flood — a crawler, a retry storm, light abuse — can exhaust the box and effectively DoS
# it. Keyed by client IP (nginx is the edge here, so $binary_remote_addr is the real
# client). Static PWA assets and /v1/health are deliberately NOT limited. http context.
limit_req_zone $binary_remote_addr zone=uwx_briefing:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name __APP_SERVER_NAME__;

    # Briefings can take a few seconds on a cache miss (live SREF/watershed ingest).
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # GRIB-derived JSON is comfortably small; allow generous request bodies anyway.
    client_max_body_size 4m;

    # Security headers (inherited by every location below; none override add_header).
    # HSTS is ignored by browsers over plain HTTP and lands in the :443 block once certbot
    # rewrites this server, so it's safe to declare here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Common proxy settings, hoisted to server scope so every location inherits them
    # (a location only inherits these while it declares no proxy_set_header of its own).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Static PWA + everything else — not rate limited (one app load fetches many assets).
    location / {
        proxy_pass http://upstreamwx_api;
    }

    # Expensive generation endpoints: allow a normal session's burst, then 429. `nodelay`
    # serves the burst immediately rather than queuing it. Both share the zone (same user
    # flow), so a warm+briefing pair counts together.
    location /v1/briefing {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }
    location /v1/watershed/warm {
        limit_req zone=uwx_briefing burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://upstreamwx_api;
    }

    # Cheap, unauthenticated liveness probe for uptime checks / load balancers.
    location = /v1/health {
        proxy_pass http://upstreamwx_api;
        access_log off;
    }
}
