# UpstreamWX — nginx reverse proxy in front of the uvicorn backend.
#
# Template: bootstrap.sh renders the __TOKENS__ from deploy/config.env and installs the
# result to /etc/nginx/sites-available/upstreamwx.conf (symlinked into sites-enabled).
#
# This config is HTTP-only on :80. Run certbot AFTER install to add TLS — it rewrites
# this server block in place and adds the :443 listener and the HTTP->HTTPS redirect:
#
#     sudo certbot --nginx -d __SERVER_NAME__
#
# The API and the PWA are single-origin (M0.4): uvicorn serves /v1/* AND the static PWA,
# so nginx just proxies everything through to one upstream.

upstream upstreamwx_api {
    server __BIND_HOST__:__BIND_PORT__;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    # Briefings can take a few seconds on a cache miss (live SREF/watershed ingest).
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # GRIB-derived JSON is comfortably small; allow generous request bodies anyway.
    client_max_body_size 4m;

    location / {
        proxy_pass http://upstreamwx_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Cheap, unauthenticated liveness probe for uptime checks / load balancers.
    location = /v1/health {
        proxy_pass http://upstreamwx_api;
        access_log off;
    }
}
