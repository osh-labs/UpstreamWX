# UpstreamWX — static landing page at the apex (upstreamwx.com + www).
#
# Template: bootstrap.sh renders the __TOKENS__ and resolves the TLS conditional regions
# (render_nginx_site), installing to /etc/nginx/sites-available/<service>-landing.conf — but
# ONLY when DEPLOY_LANDING_SERVER_NAME is non-empty (a tailnet-only staging box skips it).
#
# Pure static serving from the ACTIVE release (DEPLOY_LANDING_ROOT defaults to
# current/landing), no proxy. The app itself lives on its own subdomain
# (deploy/nginx/upstreamwx.conf). TLS is the SAME version-controlled model (SA-09): certbot
# --webroot issues one multi-SAN cert covering the app + these apex names; the :443 block
# here is under version control, not a certbot rewrite.

server {
    listen 80;
    listen [::]:80;
    server_name __LANDING_SERVER_NAME__;

    # ACME http-01 challenge — always on :80 for certbot --webroot renewals (SA-09).
    location ^~ /.well-known/acme-challenge/ {
        root __ACME_WEBROOT__;
        default_type "text/plain";
        try_files $uri =404;
    }

    # __REDIRECT_BEGIN__
    location / {
        return 301 https://$host$request_uri;
    }
    # __REDIRECT_END__

    # __HTTP_ONLY_BEGIN__
    root __LANDING_ROOT__;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self' data:; font-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # __HTTP_ONLY_END__
}

# __TLS_BEGIN__
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name __LANDING_SERVER_NAME__;

    ssl_certificate __TLS_CERT__;
    ssl_certificate_key __TLS_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:UWXSSL:10m;
    ssl_session_tickets off;

    root __LANDING_ROOT__;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self' data:; font-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
# __TLS_END__
