# UpstreamWX — static landing page at the apex (upstreamwx.com + www).
#
# Template: bootstrap.sh renders the __TOKENS__ from deploy/config.env and installs the
# result to /etc/nginx/sites-available/<service>-landing.conf — but ONLY when
# DEPLOY_LANDING_SERVER_NAME is non-empty (so a tailnet-only staging box, which has no
# apex/landing, skips it entirely).
#
# This is pure static serving from the git checkout (deploy/../landing/), no proxy. The
# app itself lives on its own subdomain (deploy/nginx/upstreamwx.conf). TLS is added by
# the SAME certbot run that covers the app name — see upstreamwx.conf's header.

server {
    listen 80;
    listen [::]:80;
    server_name __LANDING_SERVER_NAME__;

    # Served straight from the repo checkout so a deploy updates the landing for free.
    root __LANDING_ROOT__;
    index index.html;

    # Baseline security headers (mirrors the app site). The landing is fully static, so
    # a strict CSP is cheap insurance; it only loads same-origin CSS + an inline icon.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content-Security-Policy (SA-05). The landing is fully static and self-contained —
    # no JavaScript at all, only same-origin CSS + an SVG icon — so the policy is maximally
    # strict: script-src 'none'. (SA-05/SA-06 coordination: this sits in the same block PR B
    # rewrites for the :443/TLS listener — keep it here on the rebase.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self' data:; font-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'" always;

    # Static single page: serve the file, fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
