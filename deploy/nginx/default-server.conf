# UpstreamWX — catch-all default server rejecting unknown Hosts (SA-09).
#
# Template: bootstrap.sh renders + TLS-toggles this and installs it as
# /etc/nginx/sites-available/<service>-default.conf. Any request whose Host/SNI does not
# match a named server (the app or the landing) lands here and is dropped with 444 (nginx's
# "close connection with no response"). This is edge-level defense in depth beneath the
# app's TrustedHostMiddleware (SA-09), which already answers 400 for an unknown Host.
#
# One default_server per listen address per nginx instance — bootstrap only installs this on
# a box whose site set doesn't already claim default_server.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Keep ACME reachable on the default vhost too, so a challenge for a not-yet-configured
    # name still validates during first issuance (SA-09).
    location ^~ /.well-known/acme-challenge/ {
        root __ACME_WEBROOT__;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 444;
    }
}

# __TLS_BEGIN__
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Unknown-SNI TLS still needs a cert to terminate; present the app cert, then drop. (nginx
    # 1.18 lacks ssl_reject_handshake, so we terminate + 444 rather than reject the handshake.)
    ssl_certificate __TLS_CERT__;
    ssl_certificate_key __TLS_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:UWXSSL:10m;
    ssl_session_tickets off;

    return 444;
}
# __TLS_END__
