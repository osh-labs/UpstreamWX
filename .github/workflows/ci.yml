name: CI

# Gate every change on the hermetic test suite + lint BEFORE it can reach main, plus a
# supply-chain gate (SA-07): dependency audit, secret scan, and an SBOM artifact.
#
# main is only ever as good as the last green CI run, and production deploys an immutable,
# signed tag cut from main (deploy.sh verifies the tag signature when
# DEPLOY_VERIFY_TAG_SIGNATURE=1).
#
# Hermetic by design — pytest defaults to `-m 'not network'` (see pyproject.toml), so `test`
# runs fully offline against committed fixtures and needs no secrets. Opt-in live tests
# (`-m network`, NOMADS/AWS/USGS) are intentionally NOT run here.
#
# SA-07: every action is pinned to a full commit SHA (a moving @v4 tag can be repointed at
# attacker code); the trailing comment records the human-readable version. To make these
# required checks: repo Settings -> Branches -> branch protection for `main` -> Require status
# checks -> select "test" and "supply-chain". See docs/deployment-workflow.md.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python 3.11
        run: uv venv --python 3.11

      - name: Install the package + dev deps
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (hermetic — offline, committed fixtures)
        run: uv run pytest

  supply-chain:
    # SA-07: dependency-audit + secret-scan + SBOM. Dovetails with the committed uv.lock —
    # the audit and SBOM describe the EXACT resolved set the host installs with
    # `uv sync --frozen`. Runs offline against the lockfile; no project install needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Export the locked dependency set
        # The exact resolved set from uv.lock (prod only), as a requirements file the audit +
        # SBOM tools consume without installing anything. --no-hashes: with hashes present
        # pip-audit installs in pip's --require-hashes mode, which then demands EVERY transitive
        # wheel dependency also be hash-pinned — and a wheel-declared dep not in uv.lock (e.g.
        # eccodes -> eccodeslib) isn't, so the audit's dry-run resolve fails. Pinned-but-unhashed
        # is enough for a version-based advisory audit.
        run: uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements-txt -o requirements.locked.txt

      - name: Dependency audit (pip-audit)
        # Non-zero exit on a known-vulnerable dependency (pip-audit's default). No --strict: a
        # transitive wheel dep pip-audit can only skip (not a vuln) shouldn't fail the gate.
        # Escape hatch for an unfixable advisory: add `--ignore-vuln GHSA-xxxx` with a note.
        run: uvx pip-audit --requirement requirements.locked.txt

      - name: Secret scan (detect-secrets)
        # Fail if any high-signal secret is committed. Committed test fixtures (GRIB2 subsets,
        # golden JSON) are excluded to avoid entropy false positives — .env is git-ignored and
        # never in the tree, so a hit here is a real leak.
        run: |
          uvx detect-secrets scan --all-files \
            --exclude-files 'tests/fixtures/.*' \
            --exclude-files '.*\.grib2$' \
            --exclude-files 'uv\.lock$' > detect-secrets.report.json
          python - <<'PY'
          import json, sys
          report = json.load(open("detect-secrets.report.json"))
          results = report.get("results", {})
          if results:
              print("Potential secrets detected in:")
              for path in results:
                  print(f"  - {path}")
              sys.exit(1)
          print("No secrets detected.")
          PY

      - name: Generate SBOM (CycloneDX)
        run: uvx --from 'cyclonedx-bom>=4,<5' cyclonedx-py requirements requirements.locked.txt --outfile sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
