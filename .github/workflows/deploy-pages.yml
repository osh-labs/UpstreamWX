name: Deploy PWA to GitHub Pages

# Publishes the static UpstreamWX PWA in frontend/ to GitHub Pages so it can be
# installed on a phone (Add to Home Screen) and tested offline over HTTPS — the
# service worker (FR-26/28) needs a secure origin, which Pages provides.
#
# The whole frontend/ directory is uploaded as the site root, so the app lands at
#   https://<owner>.github.io/<repo>/
# All asset paths in the app are relative and the manifest scope is "./", so it
# works at that subpath with no changes.
#
# One-time setup (repo settings, owner only):
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# If the deploy is rejected with "Branch is not allowed to deploy to
# github-pages", add this branch under Settings -> Environments -> github-pages
# -> Deployment branches (or merge to the default branch).

on:
  push:
    branches:
      - claude/pwa-ui-style-guide-nbb52k
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # SA-07: actions pinned to full commit SHAs (a moving @vN tag can be repointed).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      # Stamp the release the same way deploy.sh does for the backend, so the demo build
      # advertises a version and the stale-client reload nudge works on Pages too.
      - name: Stamp frontend/version.json
        run: |
          printf '{"version": "%s", "sha": "%s", "built_at": "%s"}\n' \
            "${GITHUB_SHA::7}" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > frontend/version.json

      - name: Upload frontend/ as the Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
