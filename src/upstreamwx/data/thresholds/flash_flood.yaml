# Flash Flood hazard thresholds — PRD v0.8 Appendix B §16.1.
# Externalized, versioned config (FR-20a): the engine loads these at runtime and
# references them by key; no threshold is hard-coded in engine logic. Tune through
# field testing by editing this file — never a code change.
hazard: flash_flood
version: "1.3.0"
provenance:
  effective_date: "2026-06-29"
  rationale: >-
    v1 flood logic is driven by active NWS flood products (authoritative near-term
    anchor) plus the global ensemble probability over the upstream domain (planning
    horizon). v1.1 added the same-day high-resolution overlay (FR-7a). v1.2 broadened
    product coverage to the areal/river Flood Warning/Advisory/Watch and added an AFD
    excessive-rainfall signal. v1.3 transitions the ensembles for the SREF+HREF EOL
    (NWS SCN 26-47, 2026-08-31): the global ensemble is now **GEFS** (was SREF) and the
    same-day high-resolution overlay is now **REFS** (was HREF). The cut points are
    carried over unchanged as the starting baseline — `gefs_probability` is seeded from
    SREF's and `refs_probability` from HREF's (REFS, like HREF, ships 3 km neighborhood
    probabilities) — and remain pending field calibration against the new ensembles'
    member statistics (GEFS is coarser/global; APCP in 6 h buckets). Tune via field
    testing (FR-20a).
  source: "UpstreamWX PRD v0.8 §16.1; NWS SCN 26-47"

# Active NWS products anchor the near term (they already encode QPF-vs-FFG). Each
# active product contributes a candidate tier; the engine takes the max across
# products and the GEFS/REFS signal (products raise, never lower). Flash-flood
# products are the acute family; the areal/river Flood products cover slower-onset
# flooding (Flood Warning = flooding occurring/imminent; Advisory = nuisance/minor;
# Watch = conditions favorable). Areal tiers are UpstreamWX proposals.
products:
  flash_flood_warning_tier: extreme   # active Flash Flood Warning -> Extreme
  flash_flood_watch_tier: high        # active Flash Flood Watch   -> High
  flood_warning_tier: high            # active Flood Warning        -> High
  flood_advisory_tier: elevated       # active Flood Advisory       -> Elevated
  flood_watch_tier: elevated          # active Flood Watch          -> Elevated

# AFD forecaster discussion of excessive rainfall / flooding raises the flood
# posture to at least this tier (coarse positive signal, §16.1). UpstreamWX proposal.
afd_flood_mention_tier: elevated

# GEFS member-exceedance P(precip) over the upstream domain, percent [0, 100].
# Highest matching band wins; below elevated_min -> minimal. (Seeded from SREF's
# cut points; pending calibration to GEFS's coarse 6 h-bucket member statistics.)
gefs_probability:
  high_min: 60        # >=60% (with a meaningful convective-rate proxy) -> High
  elevated_min: 20    # 20-60% with measurable forecast precip          -> Elevated
                      # <20% / dry / no products                         -> Minimal

# REFS same-day high-resolution overlay (FR-7a, §16.1), percent [0, 100]. REFS
# neighborhood P(>=0.5"/1h or >=1"/3h QPF) over the upstream domain. NOT comparable
# to the GEFS bands above (neighborhood / 3 km / 15-member basis), so its own cut
# points. The engine evaluates this only when in-range (~6-36 h) and takes the
# higher of the GEFS- and REFS-derived tiers (FR-19). Seeded from HREF's cut points.
refs_probability:
  high_min: 40        # >=40% neighborhood probability -> High
  elevated_min: 10    # 10-40% -> Elevated
                      # <10% -> Minimal (no HREF contribution)

modifiers:
  # Significant rainfall in the prior 24-72h (saturated soils) bumps tier up one.
  antecedent_wetness_bump_tiers: 1
  # Slot canyons flood at low totals: forecast convective rate over the upstream
  # domain exceeding this (in/hr) forces at least the given tier. Conservative; flagged.
  slot_rate_in_per_hr: 0.5
  slot_fallback_min_tier: high
