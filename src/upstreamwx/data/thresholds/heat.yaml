# Heat Stress thresholds — PRD v0.8 Appendix B §16.3, FR-15.
# Uses the established NWS Heat Index categories directly (not the Minimal/Elevated/
# High/Extreme scale). The category band edges are the NWS standard and are not
# tuned; the approach-strain modifier is a UpstreamWX proposal. Config per FR-20a.
hazard: heat
scale: nws_heat_index_categories
version: "1.0.0"
provenance:
  effective_date: "2026-06-18"
  rationale: >-
    NWS Heat Index categories adopted directly for defensibility (FR-15). Approach
    phase involves exertion under load, so effective strain is advised one category
    hotter and heat surfaces at Caution+ on approach (UpstreamWX proposal).
  source: "UpstreamWX PRD v0.8 §16.3"

# Ambient heat index, deg F. Highest matching category wins; below caution_min -> none.
categories:
  extreme_danger_min: 125   # >=125 F  Extreme Danger
  danger_min: 103           # 103-124  Danger
  extreme_caution_min: 90   # 90-103   Extreme Caution
  caution_min: 80           # 80-90    Caution
                            # <80      none

modifiers:
  approach_strain_categories: 1        # effective strain runs +1 category on approach
  approach_surface_min_category: caution  # surface heat at Caution+ as a phase line on approach

# UpstreamWX mapping of NWS heat categories onto the common tier scale, used ONLY
# to fold heat into the overall mission posture max (FR-19). Heat is still shown on
# its own NWS scale everywhere else. Config so it is tunable, not hard-coded.
overall_posture_equivalence:
  caution: elevated
  extreme_caution: high
  danger: high
  extreme_danger: extreme
