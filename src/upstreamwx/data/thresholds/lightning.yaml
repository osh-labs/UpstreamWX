# Lightning hazard thresholds — PRD v0.8 Appendix B §16.2.
# Applies to exposed phases only (approach, egress); excluded from the technical
# span by FR-14c. Externalized, versioned config (FR-20a).
hazard: lightning
version: "1.5.0"
provenance:
  effective_date: "2026-06-29"
  rationale: >-
    Primary basis is the global ensemble probability of thunderstorms over the exposure
    window, cross-checked against the SPC convective outlook and AFD. CAPE modulates
    confidence/severity but never sets the tier. v1.1 added the same-day overlay (FR-7a).
    v1.2 recalibrated the Extreme bars; v1.3 added the graded AFD storm-mode signal and
    the contextual ceiling. v1.4 transitions the ensembles for the SREF+HREF EOL (NWS SCN
    26-47, 2026-08-31): the global ensemble is now **GEFS** (was SREF) and the same-day
    overlay is now **REFS** (was HREF). Cut points carry over unchanged as the baseline.
    v1.5 scopes the contextual ceiling to the REFS window: the AFD storm-mode scan is
    window-blind (the coverage word may describe a different day), and beyond REFS range the
    REFS override that keeps the cap honest can never fire — so the posture-LOWERING ceiling
    now applies only while the same-day ensemble is in range; the raise-only storm-mode floor
    is unchanged. IMPORTANT: GEFS has no native thunderstorm-probability field, so `gefs_ptstm` is fed by
    a derived CAPE×precip member-exceedance **proxy** (ingest.gefs_provider) — coarser and
    less direct than SREF's P(tstm); its cut points are pending calibration and its confidence
    should be read conservatively. In-window, REFS `LTNG` (3 km, explicit) is the dominant
    Extreme trigger; the GEFS proxy carries beyond REFS range. Tune via field testing (FR-20a).
  source: "UpstreamWX PRD v0.8 §16.2; NWS SCN 26-47"

products:
  thunderstorm_warning_tier: extreme   # active (severe) thunderstorm warning -> Extreme

# GEFS P(thunderstorm) over the exposure window, percent [0, 100]. Highest band wins.
# When REFS is available in-window, extreme_min_with_refs applies instead of extreme_min
# so the higher-resolution same-day ensemble is the dominant Extreme trigger (§16.2).
gefs_ptstm:
  extreme_min: 80           # >=80% -> Extreme (no REFS)
  extreme_min_with_refs: 85 # >=85% -> Extreme (REFS in-window; REFS drives Extreme at lower prob)
  high_min: 40              # 40-79% -> High
  elevated_min: 15          # 15-39% -> Elevated
                            # <15%   -> Minimal

# REFS same-day overlay (FR-7a, §16.2), percent [0, 100]. REFS neighborhood
# P(lightning) (explicit) or P(composite reflectivity >= 40 dBZ) over the exposure
# window. NOT comparable to the GEFS bands (neighborhood / 3 km / 11-member basis),
# so its own cut points. Evaluated only in-range (~6-36 h) and added as another tier
# candidate; the assigned tier is the max across all candidates. UpstreamWX proposals.
refs_convection:
  extreme_min: 45     # >=45% -> Extreme (REFS NEP at this level is a strong same-day signal)
  high_min: 20        # 20-44% -> High
  elevated_min: 8     # 8-19%  -> Elevated
                      # <8%    -> no REFS contribution

# SPC convective outlook category over the window -> tier (any one triggers).
# Keys cover the SPC categorical labels plus a "categorical" alias for the
# top-end severe outlook called out in §16.2's Extreme row.
spc_category:
  categorical: extreme    # explicit categorical thunder/severe
  high: extreme           # SPC High risk
  moderate: extreme       # SPC Moderate risk
  enhanced: high          # SPC Enhanced
  slight: high            # SPC Slight
  marginal: elevated      # SPC Marginal
  general_thunder: elevated  # SPC general-thunderstorm (TSTM) area

# AFD storm-mode coverage -> tier candidate (additive floor). Routine coverage
# (isolated/scattered) contributes at most Elevated; numerous/widespread raises the
# floor to High. The ceiling below then suppresses Extreme on isolated/scattered days.
afd_storm_mode:
  isolated: elevated
  scattered: elevated
  numerous: high

# Contextual ceiling when AFD describes routine convection. Applies ONLY while REFS is
# in-window (v1.5): the AFD scan is window-blind, and without REFS the override below can
# never fire, so the cap would lower a live multi-day ensemble posture unchecked. Cap the
# final tier unless REFS P(lightning) meets refs_override_min (>=): the same-day high-res
# ensemble may see more than an AFD discussion written hours earlier. No ceiling for
# "numerous".
afd_ceiling:
  isolated: elevated    # isolated -> cap final tier at Elevated
  scattered: high       # scattered -> cap final tier at High
  refs_override_min: 60 # REFS P(lightning) >= 60% bypasses the ceiling

# Instability bands (CAPE J/kg) — modulate confidence/severity, NOT the tier.
cape_bands_jkg:
  minimal_max: 500     # <500 minimal instability
  marginal_max: 1000   # 500-1000 marginal
  moderate_max: 2500   # 1000-2500 moderate
                       # >2500 strong
