# Lightning hazard thresholds — PRD v0.8 Appendix B §16.2.
# Applies to exposed phases only (approach, egress); excluded from the technical
# span by FR-14c. Externalized, versioned config (FR-20a).
hazard: lightning
version: "1.4.0"
provenance:
  effective_date: "2026-06-29"
  rationale: >-
    Primary basis is SREF probability of thunderstorms over the exposure window,
    cross-checked against the SPC convective outlook and AFD. CAPE/Lifted Index
    modulate confidence and severity but never set the tier. v1.1 added the HREF
    same-day overlay (FR-7a, §16.2): HREF neighborhood P(lightning)/P(reflectivity)
    on its own cut points, taken as another tier candidate (higher wins). v1.2
    recalibrates both ensembles: SREF Extreme raised from 70% to 80% (or 85% when
    HREF is in-window) to reduce false Extreme triggers from diffuse ensemble spread;
    HREF cut points lowered (45/20/8%) so the higher-resolution same-day ensemble is
    the dominant Extreme signal in its window. v1.3 replaces the binary AFD convective
    mention with a graded storm-mode signal (isolated/scattered/numerous) and adds a
    contextual ceiling: when the AFD describes routine coverage (isolated -> Elevated
    ceiling; scattered -> High ceiling) and HREF P(lightning) is below 60%, Extreme
    is suppressed. HREF >= 60% bypasses the ceiling so same-day high-res evidence can
    still trigger Extreme on days the AFD discussion predates. v1.4 replaces the SREF
    thunderstorm proxy from P(CAPE>1000 J/kg) to P(APCP>2.54 mm/3h). CAPE>1000 J/kg
    is an instability indicator that saturates to ~100% on any summer afternoon in the
    Southeast regardless of CIN, returning Extreme on heat-dome/suppressed-convection
    days where the AFD describes no meaningful storm threat. P(APCP>2.54 mm/3h) is a
    precipitation-accumulation field that is zero when CIN prevents convective
    initiation and only fires when ensemble members actually produce rainfall — the
    correct signal for thunderstorm probability. Cut points recalibrated for the new
    variable's probability range (spatial max over the LAoC disk, temporal max over
    the mission window): Extreme 70%/75% (no/with HREF), High 35%, Elevated 10%.
    To be tuned via field testing (FR-20a).
  source: "UpstreamWX PRD v0.8 §16.2"

products:
  thunderstorm_warning_tier: extreme   # active (severe) thunderstorm warning -> Extreme

# SREF P(APCP>2.54 mm/3h) thunderstorm proxy over the exposure window, percent [0, 100].
# Highest band wins. Spatial max over the LAoC disk, temporal max over the mission window.
# When HREF is available in-window, extreme_min_with_href applies instead of extreme_min
# so the higher-resolution same-day ensemble is the dominant Extreme trigger (§16.2).
sref_ptstm:
  extreme_min: 70           # >=70% -> Extreme (no HREF): majority of members see convective precip
  extreme_min_with_href: 75 # >=75% -> Extreme (HREF in-window; HREF drives Extreme at lower prob)
  high_min: 35              # 35-69% -> High
  elevated_min: 10          # 10-34% -> Elevated
                            # <10%   -> Minimal

# HREF same-day overlay (FR-7a, §16.2), percent [0, 100]. HREF neighborhood
# P(lightning) (explicit) or P(composite reflectivity >= 40 dBZ) over the exposure
# window. NOT comparable to the SREF bands (neighborhood / 3 km / 11-member basis),
# so its own cut points. Evaluated only in-range (~6-36 h) and added as another tier
# candidate; the assigned tier is the max across all candidates. UpstreamWX proposals.
href_convection:
  extreme_min: 45     # >=45% -> Extreme (HREF NEP at this level is a strong same-day signal)
  high_min: 20        # 20-44% -> High
  elevated_min: 8     # 8-19%  -> Elevated
                      # <8%    -> no HREF contribution

# SPC convective outlook category over the window -> tier (any one triggers).
# Keys cover the SPC categorical labels plus a "categorical" alias for the
# top-end severe outlook called out in §16.2's Extreme row.
spc_category:
  categorical: extreme    # explicit categorical thunder/severe
  high: extreme           # SPC High risk
  moderate: extreme       # SPC Moderate risk
  enhanced: high          # SPC Enhanced
  slight: high            # SPC Slight
  marginal: elevated      # SPC Marginal
  general_thunder: elevated  # SPC general-thunderstorm (TSTM) area

# AFD storm-mode coverage -> tier candidate (additive floor). Routine coverage
# (isolated/scattered) contributes at most Elevated; numerous/widespread raises the
# floor to High. The ceiling below then suppresses Extreme on isolated/scattered days.
afd_storm_mode:
  isolated: elevated
  scattered: elevated
  numerous: high

# Contextual ceiling when AFD describes routine convection. Cap the final tier unless
# HREF P(lightning) exceeds href_override_min: the same-day high-res ensemble
# may see more than an AFD discussion written hours earlier. No ceiling for "numerous".
afd_ceiling:
  isolated: elevated    # isolated -> cap final tier at Elevated
  scattered: high       # scattered -> cap final tier at High
  href_override_min: 60 # HREF P(lightning) >= 60% bypasses the ceiling

# Instability bands (CAPE J/kg) — modulate confidence/severity, NOT the tier.
cape_bands_jkg:
  minimal_max: 500     # <500 minimal instability
  marginal_max: 1000   # 500-1000 marginal
  moderate_max: 2500   # 1000-2500 moderate
                       # >2500 strong
