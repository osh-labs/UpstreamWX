# Confidence qualifier — PRD v0.8 Appendix B §16.5, FR-17.
# Applies to all hazards. Derived from SREF ensemble agreement (member support for
# the assigned tier condition) and cross-source consistency. The agreement fractions
# (40% / 75%) are UpstreamWX proposals, tuned via field testing (FR-20a).
hazard: all
version: "1.0.0"
provenance:
  effective_date: "2026-06-18"
  rationale: >-
    Operationalizes confidence as SREF member support for the assigned tier,
    adjusted by inter-source agreement (AFD / SPC / derived fields). Fractions are
    UpstreamWX proposals.
  source: "UpstreamWX PRD v0.8 §16.5"

# Fraction of SREF members supporting the assigned tier condition, [0, 1].
member_support:
  high_min: 0.75      # >=75% members + sources consistent -> High
  moderate_min: 0.40  # 40-75%, or partial source disagreement -> Moderate
                      # <40%, or sources materially conflict   -> Low

# Cross-source agreement caps. "consistent" leaves member-support result intact.
source_agreement:
  partial_disagreement_max: moderate   # partial disagreement caps confidence at Moderate
  material_conflict_tier: low          # material conflict forces Low
